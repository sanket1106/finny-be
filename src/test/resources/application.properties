spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Use Development MySQL for tests (as requested, assuming data is already there)
spring.datasource.url=jdbc:mysql://localhost:3306/finny_master?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.jdbc-url=jdbc:mysql://localhost:3306/finny_master?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# Hibernate settings
spring.jpa.hibernate.ddl-auto=none

# Tenant DataSources
finny.tenant.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
finny.tenant.datasource.url=jdbc:mysql://localhost:3306/?useSSL=false&allowPublicKeyRetrieval=true
finny.tenant.datasource.jdbc-url=jdbc:mysql://localhost:3306/?useSSL=false&allowPublicKeyRetrieval=true
finny.tenant.datasource.url-prefix=jdbc:mysql://localhost:3306/
finny.tenant.datasource.url-suffix=?useSSL=false&allowPublicKeyRetrieval=true
finny.tenant.datasource.username=root
finny.tenant.datasource.password=root
